<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Mini App</title>
    <!-- Telegram Web App script ကို ထည့်သွင်းခြင်း -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Telegram ရဲ့ Theme အရောင်တွေကို အလိုအလျောက် ယူသုံးခြင်း */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>မင်္ဂလာပါ! 🚀</h1>
    <h3 id="user-name">Loading...</h3>
    <p>ဒါကတော့ Python နဲ့ရေးထားတဲ့ Telegram Mini App စမ်းသပ်မှု ဖြစ်ပါတယ်။</p>
    
    <button onclick="closeApp()">Mini App ကို ပိတ်မည်</button>

    <script>
        // Telegram Web App object ကို ခေါ်ယူခြင်း
        let tg = window.Telegram.WebApp;
        
        // Mini App ကို မျက်နှာပြင် အပြည့်ဖွင့်ရန်
        tg.expand(); 

        // အသုံးပြုသူရဲ့ အချက်အလက်များကို ရယူခြင်း
        let user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById("user-name").innerText = "Welcome, " + user.first_name + "!";
        } else {
            document.getElementById("user-name").innerText = "Welcome, Guest!";
        }

        // App ကို ပိတ်ရန် Function
        function closeApp() {
            tg.close();
        }
    </script>

</body>
</html>
